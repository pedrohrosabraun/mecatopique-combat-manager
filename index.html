<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mecatopique Combat Manager V10</title>
<style>
body{margin:0;padding:12px;background:#141414;color:#E8DCC4;font-family:Georgia,serif}
.box{background:#2A2E35;border:2px solid #B08D57;border-radius:10px;padding:10px;margin-bottom:10px}
h1,h2{margin:4px 0;color:#E0C27A}
.sub{color:#59D7FF}
.turn{border:4px solid #B08D57}
.current{outline:3px solid #59D7FF;background:#38424d}
.dead{background:#000}
.early{background:#666}
table{
width:100%;
border-collapse:collapse;
font-size:16px;
}
th,td{border-bottom:1px solid #555;padding:4px}
input,select,button{background:#3b2d23;color:#E8DCC4;border:1px solid #B08D57;border-radius:4px;padding:4px}
.status-healthy{color:#fff}.status-poisoned{color:#22c55e}.status-bleeding{color:#ef4444}
.status-burning{color:#f97316}.status-frozen{color:#60a5fa}.status-blind{color:#a855f7}
.status-rooted{color:#a16207}.status-stunned{color:#fde047}.status-paralyzed{color:#ec4899}
.status-surprised{color:#06b6d4}.status-unconscious{color:#94a3b8}.status-dead{color:#fff;background:#000}
.setup-grid{
    display:grid;
    grid-template-columns:repeat(4,minmax(120px,1fr));
    gap:10px;
    margin-top:10px;
    margin-bottom:10px;
}

.setup-field{
    display:flex;
    flex-direction:column;
}
</style>
</head>
<body>
<div class="box">
<h1>CITY OF MECATOPIQUE</h1>
<div class="sub">REPUBLIC TACTICAL COMMAND</div>
<div>Governor Emmalia Rendors | Republic Year 37</div>
📖 Session <input id="session">
📅 Date <input id="date" type="date">
</div>

<div class="box">
<h2>👥 Roster</h2>
<div id="roster"></div>
<br>
<button onclick="save()">💾 Save All Data</button>
</div>

<div class="box">
<h2>⚙️ Combat Setup</h2>
<button onclick="startCombat()">Start New Combat</button>
<button onclick="resetCombat()">Reset Combat</button><br><br>
<div class="setup-grid">

    <div class="setup-field">
        <label>🤖 Mob Name</label>
        <input id="mobName">
    </div>

    <div class="setup-field">
        <label>❤️ Max HP</label>
        <input id="mobHP" type="number">
    </div>

    <div class="setup-field">
        <label>⚡ VP</label>
        <input id="mobVP" type="number">
    </div>

    <div class="setup-field">
        <label>👥 Number of Mobs</label>
        <input id="mobCount" type="number" value="1">
    </div>

</div>

<button onclick="addMob()">➕ Add Mob(s)</button>
</div>

<div class="box turn">
<div>🎲 ROUND <span id="round">1</span></div>
<h2 id="turnName">NO COMBAT</h2>
<div id="summary"></div>
<button onclick="nextTurn()">Next Turn</button>
<button onclick="newRound()">New Round</button>
</div>

<div class="box">
<table>
<thead><tr><th>#</th><th>Name</th><th>Initiative</th><th>HP</th><th>VP</th><th>Status</th><th>Notes</th><th>Actions</th></tr></thead>
<tbody id="tb"></tbody>
</table>
</div>

<script>
const K='mecatopique_v10';
const ST=[
'🤍 Healthy',
'🟢 Poisoned',
'🔴 Bleeding',
'🔥 Burning',
'🧊 Frozen',
'🟣 Blind',
'🌿 Rooted',
'💫 Stunned',
'⚡ Paralyzed',
'❗ Surprised',
'💀 Unconscious',
'☠️ Dead'
];
let D=JSON.parse(localStorage.getItem(K)||'null')||{
session:'Session 1',date:new Date().toISOString().slice(0,10),
roster:[{n:'Player 1',hp:100},{n:'Player 2',hp:100},{n:'Player 3',hp:100},{n:'Player 4',hp:100},{n:'Player 5',hp:100},{n:'Player 6',hp:100}],
round:1,current:0,combat:[]};

function save(){D.session=session.value;D.date=date.value;localStorage.setItem(K,JSON.stringify(D));}
function fin(c){return (+c.init||0)}
function rosterUI(){
let h='';
D.roster.forEach((p,i)=>h+=`<div><input value="${p.n}" onchange="D.roster[${i}].n=this.value;save()">
HP <input type="number" value="${p.hp}" onchange="D.roster[${i}].hp=+this.value;save()"></div>`);
roster.innerHTML=h;
}
function startCombat(){
D.combat=D.roster.map(p=>({name:p.n,maxHp:p.hp,hp:p.hp,vp:'',init:0,status:'🤍 Healthy',notes:'',early:false,type:'Player'}));
D.current=0;render();
}
function resetCombat(){D.combat=[];D.round=1;D.current=0;render();}
function addMob(){
let n=mobName.value||'Mob',hp=+mobHP.value||0,vp=+mobVP.value||0,c=+mobCount.value||1;
for(let i=1;i<=c;i++)D.combat.push({name:c>1?n+' #'+i:n,maxHp:hp,hp:hp,vp:vp,init:0,status:'🤍 Healthy',notes:'',early:false,type:'Mob'});
render();
}
function sortC(){D.combat.sort((a,b)=>fin(b)-fin(a));}
function skip(c){return c.early||c.status==='☠️ Dead'||c.status==='💀 Unconscious'}
function nextTurn(){let n=D.current+1;while(n<D.combat.length&&skip(D.combat[n]))n++;if(n>=D.combat.length){newRound();return;}D.current=n;render();}
function newRound(){D.round++;D.current=0;D.combat.forEach(c=>c.early=false);render();}
function dmg(i,v){D.combat[i].hp=Math.max(0,D.combat[i].hp-v);if(D.combat[i].hp==0)D.combat[i].status='☠️ Dead';render();}
function heal(i,v){D.combat[i].hp=Math.min(D.combat[i].maxHp,D.combat[i].hp+v);render();}

function render(){
sortC(); session.value=D.session; date.value=D.date; round.textContent=D.round;
let c=D.combat[D.current];
turnName.textContent=c?'▶️ '+c.name:'▶️ NO COMBAT';
summary.textContent=c?
`Initiative ${fin(c)} | HP ${c.hp}/${c.maxHp} | VP ${c.vp||'-'} | ${c.status}`:'';
tb.innerHTML=D.combat.map((c,i)=>{
let cls=i===D.current?'current':''; if(c.early)cls='early'; if(c.status==='☠️ Dead')cls='dead';
let dmgOpts=[...Array(101).keys()].map(n=>`<option>${n}</option>`).join('');
return `<tr class="${cls}">
<td>${i+1}</td>
<td>${c.name}</td>

<td>
<input
type="number"
min="-100"
max="300"
value="${c.init||0}"
style="width:90px;font-size:18px"
onchange="D.combat[${i}].init=+this.value;render()">
</td>
<td>${c.hp}/${c.maxHp}</td>
<td>${c.type==='Mob'?`<input style="width:55px" value="${c.vp}" onchange="D.combat[${i}].vp=this.value;save()">`:'-'}</td>
<td><select onchange="D.combat[${i}].status=this.value;render()">${ST.map(s=>`<option ${c.status==s?'selected':''}>${s}</option>`).join('')}</select><div>${c.status}</div></td>
<td><input value="${c.notes}" onchange="D.combat[${i}].notes=this.value;save()"></td>
<td>
<button onclick="if(${i}===D.current)nextTurn();else{D.combat[${i}].early=!D.combat[${i}].early;render()}">Acted Early / End Turn</button><br>
<select id="d${i}">${dmgOpts}</select><button onclick="dmg(${i},+document.getElementById('d${i}').value)">Apply Damage</button><br>
<select id="h${i}">${dmgOpts}</select><button onclick="heal(${i},+document.getElementById('h${i}').value)">Apply Heal</button>
</td></tr>`}).join('');
save();
}
rosterUI(); render();
</script>
</body></html>
